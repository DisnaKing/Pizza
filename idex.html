                <div id="menuBegudes"> <!-- S'afegeixen les begudes dinamicament --> </div>

                </div>
                <div id="comandes">
                </div>
            </div>
        </tab-component>
        <div slot="footer"> <p id="footer" >copyright 🍕 all rights reserved 2025</p></div>

    </scaffold-component>
